	<script>
		window.onerror = function(message, source, lineno, colno, error) {
			var errDiv = document.createElement('div');
			errDiv.style.position = 'fixed';
			errDiv.style.top = '0';
			errDiv.style.left = '0';
			errDiv.style.width = '100%';
			errDiv.style.height = '100%';
			errDiv.style.background = '#fff';
			errDiv.style.color = '#ff0000';
			errDiv.style.padding = '20px';
			errDiv.style.zIndex = '999999';
			errDiv.style.overflow = 'auto';
			errDiv.style.fontSize = '14px';
			errDiv.style.fontFamily = 'monospace';
			errDiv.innerHTML = '<h2>Application Crash:</h2><p style="font-weight:bold">' + message + '</p><p>Source: ' + source + ' at ' + lineno + ':' + colno + '</p><pre style="white-space:pre-wrap">' + (error ? error.stack : '') + '</pre>';
			document.body.appendChild(errDiv);
			return false;
		};
		window.addEventListener('unhandledrejection', function(event) {
			var errDiv = document.createElement('div');
			errDiv.style.position = 'fixed';
			errDiv.style.top = '0';
			errDiv.style.left = '0';
			errDiv.style.width = '100%';
			errDiv.style.height = '100%';
			errDiv.style.background = '#fff';
			errDiv.style.color = '#ff0000';
			errDiv.style.padding = '20px';
			errDiv.style.zIndex = '999999';
			errDiv.style.overflow = 'auto';
			errDiv.style.fontSize = '14px';
			errDiv.style.fontFamily = 'monospace';
			var reason = event.reason;
			var reasonStr = reason && reason.stack ? reason.stack : reason;
			errDiv.innerHTML = '<h2>Unhandled Promise Rejection:</h2><pre style="white-space:pre-wrap">' + reasonStr + '</pre>';
			document.body.appendChild(errDiv);
		});
	</script>
